name: Release Datapack

on:
  push:
    branches:
      - main
    paths:
      - 'packs/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      pack_format:
        description: 'pack_format override (bos birakirsan otomatik)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git log -1 --pretty=%B | grep -oP 'v\d+\.\d+\.\d+' | head -1)
            if [ -z "$VERSION" ]; then
              VERSION="v1.0.${GITHUB_RUN_NUMBER}"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Find Pack Directories
        id: dirs
        run: |
          DP_DIR=$(find packs/ -maxdepth 1 -type d -name "*-DP" | head -1)
          RP_DIR=$(find packs/ -maxdepth 1 -type d -name "*-RP" | head -1)
          echo "dp_dir=$DP_DIR" >> $GITHUB_OUTPUT
          echo "rp_dir=$RP_DIR" >> $GITHUB_OUTPUT
          echo "DP: $DP_DIR"
          echo "RP: $RP_DIR"

      - name: Validate Datapack
        run: |
          DIR="${{ steps.dirs.outputs.dp_dir }}"
          [ -n "$DIR" ]             || { echo "DP klasoru bulunamadi (packs/*-DP)"; exit 1; }
          [ -d "$DIR" ]             || { echo "Datapack directory not found: $DIR"; exit 1; }
          [ -f "$DIR/pack.mcmeta" ] || { echo "pack.mcmeta not found: $DIR"; exit 1; }
          [ -d "$DIR/data" ]        || { echo "data/ not found: $DIR"; exit 1; }
          echo "Datapack structure validated: $DIR"

      - name: Inject pack_format & version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DP_DIR="${{ steps.dirs.outputs.dp_dir }}"
          RP_DIR="${{ steps.dirs.outputs.rp_dir }}"

          # pack_format: workflow_dispatch input varsa kullan, yoksa mevcut değeri koru
          OVERRIDE="${{ github.event.inputs.pack_format }}"

          python3 << PYEOF
          import json, pathlib, re

          version  = "$VERSION"
          override = "$OVERRIDE"
          dirs     = ["$DP_DIR"]
          if "$RP_DIR":
              dirs.append("$RP_DIR")

          # MC versiyon → pack_format tablosu (1.21.x)
          FORMAT_MAP = {
              "1.21.9": 96, "1.21.8": 93, "1.21.7": 91,
              "1.21.6": 89, "1.21.5": 87, "1.21.4": 86,
              "1.21.3": 84, "1.21.2": 83, "1.21.1": 82,
              "1.21":   81,
          }

          for d in dirs:
              meta_path = pathlib.Path(d) / "pack.mcmeta"
              if not meta_path.exists():
                  continue

              data = json.loads(meta_path.read_text())

              # pack_format güncelle
              if override:
                  fmt = int(override)
              else:
                  # Commit mesajından MC versiyonu çek: [mc:1.21.7] gibi
                  import subprocess
                  msg = subprocess.getoutput("git log -1 --pretty=%B")
                  mc_ver = re.search(r'\[mc:([\d.]+)\]', msg)
                  if mc_ver and mc_ver.group(1) in FORMAT_MAP:
                      fmt = FORMAT_MAP[mc_ver.group(1)]
                  else:
                      fmt = data["pack"].get("pack_format", 81)  # değiştirme

              data["pack"]["pack_format"] = fmt
              data["pack"]["min_format"]  = fmt
              if "supported_formats" in data["pack"]:
                  data["pack"]["supported_formats"]["min_inclusive"] = fmt

              # description fallback'ine versiyon inject et
              desc = data["pack"].get("description", {})
              if isinstance(desc, dict) and "fallback" in desc:
                  data["pack"]["description"]["fallback"] = re.sub(
                      r'v\d+\.\d+\.\d+', version.lstrip('v'), desc["fallback"]
                  )
              elif isinstance(desc, str):
                  data["pack"]["description"] = re.sub(
                      r'v\d+\.\d+\.\d+', version.lstrip('v'), desc
                  )

              meta_path.write_text(json.dumps(data, indent=2, ensure_ascii=False))
              print(f"Injected: {meta_path} → pack_format={fmt}, version={version}")
          PYEOF

      - name: Create ZIPs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DP_DIR="${{ steps.dirs.outputs.dp_dir }}"
          RP_DIR="${{ steps.dirs.outputs.rp_dir }}"

          DP_ZIP="glc_permissions-${VERSION}-DP.zip"
          cd "$DP_DIR"
          zip -r "$GITHUB_WORKSPACE/$DP_ZIP" .
          cd "$GITHUB_WORKSPACE"
          echo "Created: $DP_ZIP"

          if [ -n "$RP_DIR" ] && [ -d "$RP_DIR" ]; then
            RP_ZIP="glc_permissions-${VERSION}-RP.zip"
            cd "$RP_DIR"
            zip -r "$GITHUB_WORKSPACE/$RP_ZIP" .
            cd "$GITHUB_WORKSPACE"
            echo "Created: $RP_ZIP"
          fi

          ls -lh glc_permissions-*.zip

      - name: Generate Checksum
        run: |
          sha256sum glc_permissions-*.zip > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: GLC Permissions ${{ steps.version.outputs.version }}
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            # 🔐 GLC Permissions System

            ## 📦 İndirme
            | Dosya | Açıklama |
            |-------|----------|
            | `glc_permissions-${{ steps.version.outputs.version }}-DP.zip` | Datapack |
            | `glc_permissions-${{ steps.version.outputs.version }}-RP.zip` | Resource Pack |

            ## ⚙️ Kurulum
            1. `-DP.zip` → `world/datapacks/` klasörüne çıkart
            2. `-RP.zip` → `resourcepacks/` klasörüne çıkart
            3. `/reload` ile yükle
            4. `/function glc_permissions:setup` ile başlat

            ## ✨ Özellikler
            - 🎭 Dinamik rol sistemi
            - 👥 Grup bazlı izinler
            - 🔧 Esnek permission yönetimi
            - 📊 Gerçek zamanlı kontrol

            ## 📋 Gereksinimler
            - Minecraft 1.21.7+
            - Paper/Spigot/Vanilla

            ---
            **Build:** #${{ github.run_number }}
          files: |
            glc_permissions-${{ steps.version.outputs.version }}-DP.zip
            glc_permissions-${{ steps.version.outputs.version }}-RP.zip
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
