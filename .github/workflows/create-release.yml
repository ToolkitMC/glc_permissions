name: Create Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
      
      - name: 🏷️ Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: ✅ Validate Structure
        run: |
          test -d datapacks/glc_permissions/data || exit 1
          test -f datapacks/glc_permissions/pack.mcmeta || exit 1
          echo "✓ Datapack structure validated"
          
      - name: 📦 Create ZIP
        run: |
          cd datapacks
          zip -r ../glc_permissions-${{ steps.version.outputs.version }}.zip glc_permissions/
          cd ..
          
      - name: 📊 Generate Checksum
        run: |
          sha256sum glc_permissions-${{ steps.version.outputs.version }}.zip > checksums.txt
          
      - name: 📝 Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # 🔐 GLC Permissions System ${{ steps.version.outputs.version }}
          
          ## 📦 İndirme
          
          **glc_permissions.zip** - Tam permission sistemi
          
          ## ⚙️ Kurulum
          
          1. ZIP dosyasını `world/datapacks/` klasörüne yerleştir
          2. Sunucuda `/reload` komutunu çalıştır
          3. `/function glc_permissions:setup` ile sistemi başlat
          
          ## ✨ Özellikler
          
          - 🎭 Dinamik rol sistemi
          - 👥 Grup bazlı izinler
          - 🔧 Esnek permission yönetimi
          - 📊 Gerçek zamanlı izin kontrolü
          - 🔄 Otomatik güncelleme sistemi
          - 💾 Kalıcı veri saklama
          
          ## 📖 Kullanım
          
          ### Admin Komutları
```mcfunction
          /function glc_permissions:admin/grant_role
          /function glc_permissions:admin/revoke_role
          /function glc_permissions:check_permission
```
          
          ### Permission Seviyeleri
          - **owner** - Tam yetki
          - **admin** - Yönetim yetkisi
          - **moderator** - Moderasyon yetkisi
          - **player** - Standart kullanıcı
          
          ## 🔗 Bağlantılar
          
          - 📚 [Dokümantasyon](../../wiki)
          - 🐛 [Sorun Bildir](../../issues)
          - 💬 [Tartışmalar](../../discussions)
          
          ## 📋 Gereksinimler
          
          - Minecraft: 1.20+
          - Server: Paper/Spigot/Vanilla
          EOF
          echo "" >> RELEASE_NOTES.md
          echo "## 🔒 SHA256 Checksum" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md
          cat checksums.txt >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md
          
      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: GLC Permissions ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            glc_permissions-${{ steps.version.outputs.version }}.zip
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
