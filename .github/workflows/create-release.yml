name: Release Datapack
on:
  push:
    branches:
      - main
    paths:
      - 'packs/**'  # FIX 1: packs → glc_permissions
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git log -1 --pretty=%B | grep -oP 'v\d+\.\d+\.\d+' | head -1)
            if [ -z "$VERSION" ]; then
              VERSION="v1.0.${GITHUB_RUN_NUMBER}"  # FIX 2: $() dışında, doğrudan env var olarak expand olur
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Validate Datapack
        run: |
          DIR="datapacks/glc_permissions"
          [ -d "$DIR" ] || { echo "Datapack directory not found"; exit 1; }
          [ -f "$DIR/pack.mcmeta" ] || { echo "pack.mcmeta not found"; exit 1; }
          [ -d "$DIR/data" ] || { echo "data directory not found"; exit 1; }
          echo "✓ Datapack structure validated"

      - name: Create ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIR="datapacks/glc_permissions"
          ZIP="glc_permissions-${VERSION}.zip"
          cd "$DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP" .
          cd "$GITHUB_WORKSPACE"
          echo "Created: $ZIP"
          ls -lh "$ZIP"

      - name: Generate Checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="glc_permissions-${VERSION}.zip"
          sha256sum "$ZIP" > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: GLC Permissions ${{ steps.version.outputs.version }}
          # FIX 3: Aynı tag varsa güncelle, fail etme
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            # 🔐 GLC Permissions System

            ## 📦 İndirme
            `glc_permissions-${{ steps.version.outputs.version }}.zip`

            ## ⚙️ Kurulum
            1. ZIP'i `world/datapacks/` klasörüne at
            2. `/reload` komutu ile yükle
            3. `/function glc_permissions:setup` ile başlat

            ## ✨ Özellikler
            - 🎭 Dinamik rol sistemi
            - 👥 Grup bazlı izinler
            - 🔧 Esnek permission yönetimi
            - 📊 Gerçek zamanlı kontrol

            ## 📋 Gereksinimler
            - Minecraft 1.21.7+
            - Paper/Spigot/Vanilla

            ---
            **Build:** #${{ github.run_number }}
          files: |
            glc_permissions-${{ steps.version.outputs.version }}.zip
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}