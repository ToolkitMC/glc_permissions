name: Lint & Validate

on:
  push:
    paths:
      - 'datapacks/**'
  pull_request:
    paths:
      - 'datapacks/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.summary.outputs.text }}
      status:  ${{ steps.summary.outputs.status }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── 1. JSON Lint ─────────────────────────────────────────
      - name: JSON Lint
        run: |
          echo "🔍 JSON dosyaları kontrol ediliyor..."
          ERRORS=0

          while IFS= read -r f; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "  ✓ $f"
            else
              echo "  ❌ Bozuk JSON: $f"
              python3 -m json.tool "$f" 2>&1 | tail -1
              ERRORS=$((ERRORS+1))
            fi
          done < <(find datapacks/ -name "*.json" -o -name "*.mcmeta")

          [ $ERRORS -eq 0 ] || { echo "❌ $ERRORS JSON hatası bulundu."; exit 1; }
          echo "✓ Tüm JSON dosyaları geçerli"

      # ── 2. pack.mcmeta Kontrolü ───────────────────────────────
      - name: Validate pack.mcmeta
        run: |
          python3 -c "
          import json, sys, pathlib

          errors = []
          for meta in pathlib.Path('datapacks').rglob('pack.mcmeta'):
              try:
                  data = json.loads(meta.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f'{meta}: Geçersiz JSON -> {e}')
                  continue

              pack = data.get('pack', {})

              if 'pack_format' not in pack:
                  errors.append(f'{meta}: pack_format eksik')
              elif not isinstance(pack['pack_format'], int):
                  errors.append(f'{meta}: pack_format integer olmali')
              elif pack['pack_format'] < 1:
                  errors.append(f'{meta}: pack_format gecersiz deger ({pack[\"pack_format\"]})')
              else:
                  print(f'  ok {meta} -> pack_format: {pack[\"pack_format\"]}')

              if 'description' not in pack:
                  errors.append(f'{meta}: description eksik')

          if errors:
              print('HATA:')
              for e in errors: print(f'  {e}')
              sys.exit(1)

          print('Tum pack.mcmeta dosyalari gecerli')
          "

      # ── 3. mcfunction Lint + Makro Validator ─────────────────
      - name: mcfunction Lint & Macro Validator
        run: |
          python3 << 'PYEOF'
          import re, sys
          from pathlib import Path

          # Gecerli makro: $( snake_case )
          VALID_MACRO = re.compile(r'^\$\([a-zA-Z_][a-zA-Z0-9_]*\)$')

          # Gecersiz makro pattern'leri
          INVALID_PATTERNS = [
              (re.compile(r'\$\(\s*\)'),
               "bos makro $()"),
              (re.compile(r'\$\([^)]*\s[^)]*\)'),
               "bosluk iceren makro $( ... )"),
              (re.compile(r'\$\([^)]*\d[^)]*\.[^)]*\)|\$\([^)]*\.[^)]*\d[^)]*\)'),
               "rakam+nokta iceren makro, ornek: $(1.2.3)"),
              (re.compile(r'\$\([^)]*[<>|&;!\'"@#%^*+=\[\]{}\\][^)]*\)'),
               "ozel karakter iceren makro, ornek: $(<x>)"),
              (re.compile(r'\$\([^)]*[^\x00-\x7F][^)]*\)'),
               "Turkce/non-ASCII iceren makro, ornek: $(ğşıöü)"),
              (re.compile(r'\$\([^)]*\.[^)]*\)'),
               "nokta iceren makro, ornek: $(a.b)"),
          ]

          # Komut syntax kontrolleri
          BAD_COMMANDS = [
              (re.compile(r'^(?!\$?\s*#)execute\b(?!.*\brun\b).*$', re.IGNORECASE),
               "execute komutu 'run' olmadan bitiyor"),
              (re.compile(r'^\$?(?:.*\brun\s+)?function\s+(?![a-zA-Z0-9_\-]+:[a-zA-Z0-9_\-/]+\S*\s*$)(\S+)', re.IGNORECASE),
               "function cagrisinda namespace eksik (namespace:path gerekli)"),
          ]

          errors   = []
          warnings = []
          files_ok = 0

          for f in sorted(Path('datapacks').rglob('*.mcfunction')):
              file_errors = 0
              lines = f.read_text(encoding='utf-8', errors='replace').splitlines()

              for lineno, line in enumerate(lines, 1):
                  stripped = line.strip()
                  if not stripped or stripped.startswith('#'):
                      continue

                  # Makro kontrolleri
                  for macro in re.findall(r'\$\([^)]*\)', stripped):
                      matched = None
                      for pattern, reason in INVALID_PATTERNS:
                          if pattern.search(macro):
                              matched = reason
                              break
                      if matched:
                          errors.append(f"{f}:{lineno}: gecersiz makro '{macro}' -> {matched}")
                          errors.append(f"    | {stripped[:120]}")
                          file_errors += 1
                      elif not VALID_MACRO.match(macro):
                          errors.append(f"{f}:{lineno}: tanimsiz makro formati '{macro}'")
                          errors.append(f"    | {stripped[:120]}")
                          file_errors += 1

                  # Komut syntax
                  for pattern, reason in BAD_COMMANDS:
                      if pattern.search(stripped):
                          warnings.append(f"{f}:{lineno}: {reason}")
                          warnings.append(f"    | {stripped[:120]}")
                          break

                  # Trailing whitespace
                  if line != line.rstrip():
                      warnings.append(f"{f}:{lineno}: trailing whitespace")

              if file_errors == 0:
                  files_ok += 1

          total = len(list(Path('datapacks').rglob('*.mcfunction')))
          print(f"\n{total} .mcfunction dosyasi tarandi, {files_ok} temiz")

          if warnings:
              print(f"\n{len([w for w in warnings if not w.startswith('    ')])} uyari:")
              for w in warnings:
                  print(f"  {w}")

          if errors:
              print(f"\n{len([e for e in errors if not e.startswith('    ')])} hata:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)

          print("Tum .mcfunction dosyalari temiz")
          PYEOF

      # ── 4. Namespace Referans Kontrolü ───────────────────────
      - name: Namespace Reference Check
        run: |
          python3 << 'PYEOF'
          import re, sys
          from pathlib import Path

          # Mevcut namespace'leri topla
          known_namespaces = set()
          for ns_dir in Path('datapacks').rglob('data'):
              if ns_dir.is_dir():
                  for child in ns_dir.iterdir():
                      if child.is_dir():
                          known_namespaces.add(child.name)

          VANILLA = {'minecraft', 'forge', 'neoforge'}
          print(f"Bulunan namespace'ler: {', '.join(sorted(known_namespaces))}")

          FUNC_REF = re.compile(r'\bfunction\s+([a-zA-Z0-9_\-]+):([a-zA-Z0-9_\-/]+)', re.IGNORECASE)

          errors   = []
          warnings = []

          for f in sorted(Path('datapacks').rglob('*.mcfunction')):
              lines = f.read_text(encoding='utf-8', errors='replace').splitlines()
              for lineno, line in enumerate(lines, 1):
                  stripped = line.strip()
                  if not stripped or stripped.startswith('#'):
                      continue

                  for m in FUNC_REF.finditer(stripped):
                      ns   = m.group(1)
                      path = m.group(2)

                      if ns in VANILLA:
                          continue

                      if ns not in known_namespaces:
                          errors.append(
                              f"{f}:{lineno}: bilinmeyen namespace '{ns}' -> function {ns}:{path}"
                          )
                          errors.append(f"    | {stripped[:120]}")
                          continue

                      # Fonksiyon dosyasi var mi?
                      matches = list(Path('datapacks').rglob(
                          f"data/{ns}/function/{path}.mcfunction"
                      ))
                      if not matches:
                          warnings.append(
                              f"{f}:{lineno}: fonksiyon dosyasi bulunamadi -> {ns}:{path}"
                          )

          if warnings:
              print(f"\n{len(warnings)} eksik referans uyarisi:")
              for w in warnings:
                  print(f"  {w}")

          if errors:
              print(f"\n{len([e for e in errors if not e.startswith('    ')])} namespace hatasi:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)

          print("Namespace referanslari gecerli")
          PYEOF

      # ── 5. Klasör Yapısı ──────────────────────────────────────
      - name: Datapack Structure Check
        run: |
          echo "Klasor yapisi kontrol ediliyor..."
          ERRORS=0

          for dir in datapacks/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            DIR_OK=true

            [ -f "$dir/pack.mcmeta" ] || { echo "  HATA $name: pack.mcmeta eksik"; ERRORS=$((ERRORS+1)); DIR_OK=false; }
            [ -d "$dir/data" ]        || { echo "  HATA $name: data/ dizini eksik"; ERRORS=$((ERRORS+1)); DIR_OK=false; }

            [ "$DIR_OK" = true ] && echo "  OK $name yapisi gecerli"
          done

          [ $ERRORS -eq 0 ] || { echo "Yapi hatalari bulundu."; exit 1; }

      # ── 6. Dosya Boyutu ───────────────────────────────────────
      - name: File Size Check
        run: |
          ERRORS=0

          while IFS= read -r f; do
            SIZE=$(stat -c%s "$f")
            if [ "$SIZE" -gt 2097152 ]; then
              echo "  HATA Asiri buyuk dosya: $f ($(du -h "$f" | cut -f1))"
              ERRORS=$((ERRORS+1))
            fi
          done < <(find datapacks/ -type f)

          TOTAL=$(du -sb datapacks/ | cut -f1)
          if [ "$TOTAL" -gt 52428800 ]; then
            echo "  UYARI Toplam datapack boyutu buyuk: $(du -sh datapacks/ | cut -f1)"
          fi

          [ $ERRORS -eq 0 ] || { echo "Boyut limiti asildi."; exit 1; }
          echo "Boyut kontrolleri gecti"

      # ── 7. Dosya Tipi Whitelist ───────────────────────────────
      - name: File Type Whitelist
        run: |
          ALLOWED="json mcmeta mcfunction png nbt md txt"
          ERRORS=0

          while IFS= read -r f; do
            EXT="${f##*.}"
            EXT="${EXT,,}"
            ALLOWED_FLAG=false
            for a in $ALLOWED; do
              [ "$EXT" = "$a" ] && ALLOWED_FLAG=true && break
            done
            if [ "$ALLOWED_FLAG" = false ]; then
              echo "  HATA Izin verilmeyen dosya tipi: $f (.${EXT})"
              ERRORS=$((ERRORS+1))
            fi
          done < <(find datapacks/ -type f)

          [ $ERRORS -eq 0 ] || { echo "Gecersiz dosya tipleri bulundu."; exit 1; }
          echo "Tum dosya tipleri izin listesinde"

      # ── 8. Özet ───────────────────────────────────────────────
      - name: Summary
        id: summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && ICON="passed" || ICON="failed"

          MC_COUNT=$(find datapacks/ -name "*.mcfunction" 2>/dev/null | wc -l)
          JSON_COUNT=$(find datapacks/ -name "*.json" 2>/dev/null | wc -l)

          TEXT="## Lint Sonucu: ${ICON}

          | Alan | Deger |
          |------|-------|
          | Repo | ${{ github.repository }} |
          | Branch | ${{ github.ref_name }} |
          | Commit | ${{ github.sha }} |
          | Tarih | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | .mcfunction | ${MC_COUNT} dosya |
          | .json | ${JSON_COUNT} dosya |

          ### Kontroller
          - JSON Lint
          - pack.mcmeta Dogrulama
          - mcfunction + Makro Syntax
          - Namespace Referans Kontrolu
          - Klasor Yapisi
          - Dosya Boyutu
          - Dosya Tipi Whitelist"

          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$TEXT"     >> $GITHUB_OUTPUT
          echo "EOF"       >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "$TEXT" >> $GITHUB_STEP_SUMMARY

  # ── PR Yorum Job'u ────────────────────────────────────────────
  pr-comment:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - name: PR Lint Yorumu
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ needs.lint.outputs.summary }}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Lint Sonucu')
            );

            const body = summary + '\n\n---\n*Guncellendi: ' +
              new Date().toISOString() + '*';

            if (botComment) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }