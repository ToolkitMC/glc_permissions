name: Lint & Validate

on:
  push:
    paths:
      - 'packs/**'
  pull_request:
    paths:
      - 'packs/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.summary.outputs.text }}
      status:  ${{ steps.summary.outputs.status }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: JSON Lint
        run: |
          ERRORS=0
          while IFS= read -r f; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "  OK $f"
            else
              echo "  HATA Bozuk JSON: $f"
              python3 -m json.tool "$f" 2>&1 | tail -1
              ERRORS=$((ERRORS+1))
            fi
          done < <(find packs/ -name "*.json" -o -name "*.mcmeta")
          [ $ERRORS -eq 0 ] || { echo "$ERRORS JSON hatasi."; exit 1; }
          echo "Tum JSON gecerli"

      - name: Validate pack.mcmeta
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib
          errors = []
          for meta in pathlib.Path('packs').rglob('pack.mcmeta'):
              try:
                  data = json.loads(meta.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f"{meta}: Gecersiz JSON -> {e}")
                  continue
              pack = data.get('pack', {})
              if 'pack_format' not in pack:
                  errors.append(f"{meta}: pack_format eksik")
              elif not isinstance(pack['pack_format'], int):
                  errors.append(f"{meta}: pack_format integer olmali")
              elif pack['pack_format'] < 1:
                  errors.append(f"{meta}: pack_format gecersiz")
              else:
                  print(f"  OK {meta} -> pack_format: {pack['pack_format']}")
              if 'description' not in pack:
                  errors.append(f"{meta}: description eksik")
          if errors:
              for e in errors: print(f"  HATA {e}")
              sys.exit(1)
          print("Tum pack.mcmeta gecerli")
          EOF

      - name: mcfunction Lint and Macro Validator
        run: |
          python3 - <<'EOF'
          import re, sys
          from pathlib import Path

          VALID = re.compile(r'^\$\([a-zA-Z_][a-zA-Z0-9_]*\)$')
          INV = [
              (re.compile(r'\$\(\s*\)'),                    'bos makro'),
              (re.compile(r'\$\([^)]*\s[^)]*\)'),           'bosluk iceren'),
              (re.compile(r'\$\([^)]*\d[^)]*\.[^)]*\)'),   'rakam+nokta'),
              (re.compile(r'\$\([^)]*[^\x00-\x7F][^)]*\)'), 'non-ASCII'),
              (re.compile(r'\$\([^)]*\.[^)]*\)'),           'nokta iceren'),
          ]
          BAD = [
              (re.compile(r'^(?!\$?\s*#)execute\b(?!.*\brun\b).*$', re.I), 'execute run yok'),
          ]

          errors, warnings, ok = [], [], 0
          for f in sorted(Path('packs').rglob('*.mcfunction')):
              fe = 0
              for n, line in enumerate(f.read_text(encoding='utf-8', errors='replace').splitlines(), 1):
                  s = line.strip()
                  if not s or s.startswith('#'):
                      continue
                  for macro in re.findall(r'\$\([^)]*\)', s):
                      m = next((r for p, r in INV if p.search(macro)), None)
                      if m:
                          errors += [f"{f}:{n}: gecersiz makro {repr(macro)} -> {m}", f"    | {s[:100]}"]
                          fe += 1
                      elif not VALID.match(macro):
                          errors += [f"{f}:{n}: tanimsiz makro {repr(macro)}", f"    | {s[:100]}"]
                          fe += 1
                  for p, r in BAD:
                      if p.search(s):
                          warnings += [f"{f}:{n}: {r}", f"    | {s[:100]}"]
                          break
                  if line != line.rstrip():
                      warnings.append(f"{f}:{n}: trailing whitespace")
              if fe == 0:
                  ok += 1

          total = len(list(Path('packs').rglob('*.mcfunction')))
          print(f"{total} mcfunction tarandi, {ok} temiz")
          if warnings:
              for w in warnings: print(f"  {w}")
          if errors:
              for e in errors: print(f"  {e}")
              sys.exit(1)
          print("Tum mcfunction temiz")
          EOF

      - name: Namespace Reference Check
        run: |
          python3 - <<'EOF'
          import re, sys
          from pathlib import Path

          known = set()
          for d in Path('packs').rglob('data'):
              if d.is_dir():
                  for c in d.iterdir():
                      if c.is_dir(): known.add(c.name)

          VANILLA = {'minecraft', 'forge', 'neoforge'}
          print('Namespaceler: ' + ', '.join(sorted(known)))

          REF = re.compile(r'\bfunction\s+([a-zA-Z0-9_-]+):([a-zA-Z0-9_/-]+)', re.I)
          errors, warnings = [], []

          for f in sorted(Path('packs').rglob('*.mcfunction')):
              for n, line in enumerate(f.read_text(encoding='utf-8', errors='replace').splitlines(), 1):
                  s = line.strip()
                  if not s or s.startswith('#'): continue
                  for m in REF.finditer(s):
                      ns, path = m.group(1), m.group(2)
                      if ns in VANILLA: continue
                      if ns not in known:
                          errors += [f"{f}:{n}: bilinmeyen ns {repr(ns)}", f"    | {s[:100]}"]
                          continue
                      if not list(Path('packs').rglob(f'data/{ns}/function/{path}.mcfunction')):
                          warnings.append(f"{f}:{n}: fonksiyon yok -> {ns}:{path}")

          if warnings:
              for w in warnings: print(f"  {w}")
          if errors:
              for e in errors: print(f"  {e}")
              sys.exit(1)
          print("Namespace referanslari gecerli")
          EOF

      - name: Datapack Structure Check
        run: |
          ERRORS=0
          for dir in packs/*-DP/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            DIR_OK=true
            [ -f "$dir/pack.mcmeta" ] || { echo "  HATA $name: pack.mcmeta eksik"; ERRORS=$((ERRORS+1)); DIR_OK=false; }
            [ -d "$dir/data" ]        || { echo "  HATA $name: data/ eksik";        ERRORS=$((ERRORS+1)); DIR_OK=false; }
            [ "$DIR_OK" = true ] && echo "  OK $name"
          done
          [ $ERRORS -eq 0 ] || { echo "Yapi hatalari."; exit 1; }

      - name: File Size Check
        run: |
          ERRORS=0
          while IFS= read -r f; do
            SIZE=$(stat -c%s "$f")
            if [ "$SIZE" -gt 2097152 ]; then
              echo "  HATA Buyuk dosya: $f ($(du -h "$f" | cut -f1))"
              ERRORS=$((ERRORS+1))
            fi
          done < <(find packs/ -type f)
          TOTAL=$(du -sb packs/ | cut -f1)
          [ "$TOTAL" -gt 52428800 ] && echo "  UYARI Toplam buyuk: $(du -sh packs/ | cut -f1)"
          [ $ERRORS -eq 0 ] || { echo "Boyut limiti asildi."; exit 1; }
          echo "Boyut OK"

      - name: File Type Whitelist
        run: |
          ALLOWED="json mcmeta mcfunction png nbt md txt ogg wav lang csv properties fsh vsh glsl"
          ERRORS=0
          find packs/ -type f -print0 | while IFS= read -r -d '' f; do
            EXT="${f##*.}"
            EXT="$(printf '%s' "$EXT" | tr '[:upper:]' '[:lower:]' | tr -d '\r\n')"

            OK=false
            for a in $ALLOWED; do
              [ "$EXT" = "$a" ] && OK=true && break
            done

            if [ "$OK" = false ]; then
              echo "  HATA Izin verilmeyen: $f (.$EXT)"
              ERRORS=$((ERRORS+1))
            fi
          done

          [ $ERRORS -eq 0 ] || { echo "Gecersiz dosya tipleri."; exit 1; }
          echo "Dosya tipleri OK"

      - name: Summary
        id: summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && ICON="PASSED" || ICON="FAILED"
          MC=$(find packs/ -name "*.mcfunction" 2>/dev/null | wc -l)
          JS=$(find packs/ -name "*.json" 2>/dev/null | wc -l)
          TEXT="## Lint: ${ICON}
          | Alan | Deger |
          |------|-------|
          | Repo | ${{ github.repository }} |
          | Branch | ${{ github.ref_name }} |
          | Commit | ${{ github.sha }} |
          | Tarih | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | .mcfunction | ${MC} |
          | .json | ${JS} |"
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$TEXT"    >> $GITHUB_OUTPUT
          echo "EOF"       >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "$TEXT" >> $GITHUB_STEP_SUMMARY

  pr-comment:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - name: PR Lint Yorumu
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ needs.lint.outputs.summary }}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const bot = comments.data.find(c => c.user.type === 'Bot' && c.body.includes('Lint:'));
            const body = summary + '\n\n---\n*' + new Date().toISOString() + '*';
            if (bot) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: bot.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
