name: Lint & Validate

on:
  push:
    paths:
      - 'packs/**'
  pull_request:
    paths:
      - 'packs/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.summary.outputs.text }}
      status:  ${{ steps.summary.outputs.status }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: JSON Lint
        run: |
          ERRORS=0
          while IFS= read -r f; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "  OK $f"
            else
              echo "  HATA Bozuk JSON: $f"
              python3 -m json.tool "$f" 2>&1 | tail -1
              ERRORS=$((ERRORS+1))
            fi
          done < <(find packs/ -name "*.json" -o -name "*.mcmeta")
          [ $ERRORS -eq 0 ] || { echo "$ERRORS JSON hatasi."; exit 1; }
          echo "Tum JSON gecerli"

      - name: Validate pack.mcmeta
        run: |
          echo "" | base64 -d | python3

      - name: mcfunction Lint and Macro Validator
        run: |
          echo "" | base64 -d | python3

      - name: Namespace Reference Check
        run: |
          echo "" | base64 -d | python3

      - name: Datapack Structure Check
        run: |
          ERRORS=0
          for dir in packs/*-DP/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            DIR_OK=true
            [ -f "$dir/pack.mcmeta" ] || { echo "  HATA $name: pack.mcmeta eksik"; ERRORS=$((ERRORS+1)); DIR_OK=false; }
            [ -d "$dir/data" ]        || { echo "  HATA $name: data/ eksik";        ERRORS=$((ERRORS+1)); DIR_OK=false; }
            [ "$DIR_OK" = true ] && echo "  OK $name"
          done
          [ $ERRORS -eq 0 ] || { echo "Yapi hatalari."; exit 1; }

      - name: File Size Check
        run: |
          ERRORS=0
          while IFS= read -r f; do
            SIZE=$(stat -c%s "$f")
            if [ "$SIZE" -gt 2097152 ]; then
              echo "  HATA Buyuk dosya: $f ($(du -h "$f" | cut -f1))"
              ERRORS=$((ERRORS+1))
            fi
          done < <(find packs/ -type f)
          TOTAL=$(du -sb packs/ | cut -f1)
          [ "$TOTAL" -gt 52428800 ] && echo "  UYARI Toplam buyuk: $(du -sh packs/ | cut -f1)"
          [ $ERRORS -eq 0 ] || { echo "Boyut limiti asildi."; exit 1; }
          echo "Boyut OK"

      - name: File Type Whitelist
        run: |
          ALLOWED="json mcmeta mcfunction png nbt md txt"
          ERRORS=0
          while IFS= read -r f; do
            EXT="${f##*.}"
            EXT="${EXT,,}"
            OK=false
            for a in $ALLOWED; do [ "$EXT" = "$a" ] && OK=true && break; done
            [ "$OK" = false ] && { echo "  HATA Izin verilmeyen: $f (.${EXT})"; ERRORS=$((ERRORS+1)); }
          done < <(find packs/ -type f)
          [ $ERRORS -eq 0 ] || { echo "Gecersiz dosya tipleri."; exit 1; }
          echo "Dosya tipleri OK"

      - name: Summary
        id: summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && ICON="PASSED" || ICON="FAILED"
          MC=$(find packs/ -name "*.mcfunction" 2>/dev/null | wc -l)
          JS=$(find packs/ -name "*.json" 2>/dev/null | wc -l)
          TEXT="## Lint: ${ICON}
          | Alan | Deger |
          |------|-------|
          | Repo | ${{ github.repository }} |
          | Branch | ${{ github.ref_name }} |
          | Commit | ${{ github.sha }} |
          | Tarih | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | .mcfunction | ${MC} |
          | .json | ${JS} |"
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$TEXT"    >> $GITHUB_OUTPUT
          echo "EOF"       >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "$TEXT" >> $GITHUB_STEP_SUMMARY

  pr-comment:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - name: PR Lint Yorumu
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ needs.lint.outputs.summary }}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const bot = comments.data.find(c => c.user.type === 'Bot' && c.body.includes('Lint:'));
            const body = summary + '\n\n---\n*' + new Date().toISOString() + '*';
            if (bot) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: bot.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
