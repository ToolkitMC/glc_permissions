name: Release GLC Permissions

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versiyon (örn: v2.5.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Folder Names
        id: folders
        run: |
          VERSION="${{ github.event.inputs.version }}"

          RP_DIR=$(find packs -maxdepth 1 -type d -name "*RP*" | head -1 || true)
          DP_DIR=$(find packs -maxdepth 1 -type d -name "*DP*" | head -1 || true)

          echo "RP: $RP_DIR"
          echo "DP: $DP_DIR"

          # Eğer klasör yoksa uyar, ama exit 1 verme
          if [ -z "$RP_DIR" ]; then
            echo "⚠️ RP klasörü bulunamadı, ZIP oluşturulmayacak."
          fi
          if [ -z "$DP_DIR" ]; then
            echo "⚠️ DP klasörü bulunamadı, ZIP oluşturulmayacak."
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "rp_dir=$RP_DIR" >> $GITHUB_OUTPUT
          echo "dp_dir=$DP_DIR" >> $GITHUB_OUTPUT
          echo "rp_zip=Gulce_s_Permissions_RP_${VERSION}.zip" >> $GITHUB_OUTPUT
          echo "dp_zip=Gulce_s_Permissions_DP_${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Create ZIPs
        run: |
          if [ -n "${{ steps.folders.outputs.rp_dir }}" ]; then
            cd "${{ steps.folders.outputs.rp_dir }}"
            zip -r "$GITHUB_WORKSPACE/${{ steps.folders.outputs.rp_zip }}" .
          fi

          if [ -n "${{ steps.folders.outputs.dp_dir }}" ]; then
            cd "${{ steps.folders.outputs.dp_dir }}"
            zip -r "$GITHUB_WORKSPACE/${{ steps.folders.outputs.dp_zip }}" .
          fi

      - name: Create Release Notes
        id: notes
        run: |
          echo "## 🔒 GLC Permissions System" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 İndirme" >> release_notes.md
          if [ -n "${{ steps.folders.outputs.rp_dir }}" ]; then
            echo "- Resource Pack: \`${{ steps.folders.outputs.rp_zip }}\`" >> release_notes.md
          fi
          if [ -n "${{ steps.folders.outputs.dp_dir }}" ]; then
            echo "- Data Pack: \`${{ steps.folders.outputs.dp_zip }}\`" >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "### ⚙️ Kurulum" >> release_notes.md
          echo "1. DP ZIP → \`world/datapacks/\`" >> release_notes.md
          echo "2. RP ZIP → \`resourcepacks/\`" >> release_notes.md
          echo "3. \`/reload\`" >> release_notes.md
          echo "4. \`/function glc_permissions:setup\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### ✨ Özellikler" >> release_notes.md
          echo "- 👥 Dinamik rol sistemi" >> release_notes.md
          echo "- 🔑 Grup bazlı izinler" >> release_notes.md
          echo "- ⚡ Fonksiyon bazlı yönetim" >> release_notes.md
          echo "- 🌐 TR/EN dil desteği" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "Build: ${{ github.run_number }}" >> release_notes.md
          echo "Commit: ${{ github.sha }}" >> release_notes.md

      - name: Create Release via GH CLI
        run: |
          gh release create "${{ steps.folders.outputs.version }}" \
            $([[ -n "${{ steps.folders.outputs.rp_dir }}" ]] && echo "${{ steps.folders.outputs.rp_zip }}") \
            $([[ -n "${{ steps.folders.outputs.dp_dir }}" ]] && echo "${{ steps.folders.outputs.dp_zip }}") \
            --title "GLC Permissions ${{ steps.folders.outputs.version }}" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
