name: Release GLC Permissions

on:
  push:
    branches:
      - main
    paths:
      - 'new_versions/**'
  workflow_dispatch:
    inputs:
      mc_version:
        description: 'Minecraft versiyonu (örn: v2.5.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.mc_version }}"
            echo "mc_version=$VERSION" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            # Push ile tetiklendi — değişen klasörü bul
            PARENT=$(git rev-parse HEAD^ 2>/dev/null || echo "")
            if [ -z "$PARENT" ]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            changed=$(git diff --name-only HEAD^ HEAD | grep '^new_versions/' | cut -d'/' -f2 | sort -uV | tail -n1)

            if [ -z "$changed" ]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "mc_version=$changed" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate Datapack
        if: steps.version.outputs.has_changes == 'true'
        run: |
          DIR="new_versions/${{ steps.version.outputs.mc_version }}/datapack"
          if [ ! -d "$DIR" ]; then
            echo "❌ Klasör bulunamadı: $DIR"
            exit 1
          fi
          if [ ! -f "$DIR/pack.mcmeta" ]; then
            echo "❌ pack.mcmeta bulunamadı"
            exit 1
          fi
          if [ ! -d "$DIR/data" ]; then
            echo "❌ data/ klasörü bulunamadı"
            exit 1
          fi
          echo "✅ Datapack doğrulandı"

      - name: Create ZIP
        if: steps.version.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.version.outputs.mc_version }}"
          DIR="new_versions/$VERSION/datapack"
          ZIP="glc_permissions-${VERSION}.zip"
          cd "$DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP" .
          echo "zip_name=$ZIP" >> $GITHUB_ENV

      - name: Create Release
        if: steps.version.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.mc_version }}
          name: GLC Permissions ${{ steps.version.outputs.mc_version }}
          body: |
            ## 🔒 GLC Permissions System

            ### 📦 İndirme
            `glc_permissions-${{ steps.version.outputs.mc_version }}.zip`

            ### ⚙️ Kurulum
            1. ZIP'i `world/datapacks/` klasörüne at
            2. `/reload` komutu ile yükle
            3. `/function glc_permissions:setup` ile başlat

            ### ✨ Özellikler
            - 👥 Dinamik rol sistemi
            - 🔑 Grup bazlı izinler
            - ⚡ Fonksiyon bazlı yönetim
            - 🌐 TR/EN dil desteği

            ---
            > Build: `${{ github.run_number }}` | Commit: `${{ github.sha }}`
          files: glc_permissions-${{ steps.version.outputs.mc_version }}.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
