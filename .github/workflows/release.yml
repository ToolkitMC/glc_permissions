name: Release GLC Permissions

on:
workflow_dispatch:
inputs:
version:
description: 'Versiyon (örn: v2.5.1)'
required: true
type: string

permissions:
contents: write

jobs:
release:
runs-on: ubuntu-latest

```
steps:
  - name: 📥 Checkout
    uses: actions/checkout@v4

  - name: 🔍 Klasörleri Bul
    id: folders
    run: |
      VERSION="${{ github.event.inputs.version }}"

      echo "📂 packs içeriği:"
      ls -la packs/

      RP_DIR=$(find packs -maxdepth 1 -type d -name "*RP*" | head -1)
      DP_DIR=$(find packs -maxdepth 1 -type d -name "*DP*" | head -1)

      echo "RP: $RP_DIR"
      echo "DP: $DP_DIR"

      if [ -z "$RP_DIR" ] || [ -z "$DP_DIR" ]; then
        echo "❌ RP veya DP klasörü bulunamadı!"
        exit 1
      fi

      echo "version=$VERSION" >> $GITHUB_OUTPUT
      echo "rp_dir=$RP_DIR" >> $GITHUB_OUTPUT
      echo "dp_dir=$DP_DIR" >> $GITHUB_OUTPUT
      echo "rp_zip=Gulce_s_Permissions_RP_${VERSION}.zip" >> $GITHUB_OUTPUT
      echo "dp_zip=Gulce_s_Permissions_DP_${VERSION}.zip" >> $GITHUB_OUTPUT

  - name: 📦 ZIP Oluştur
    run: |
      cd "${{ steps.folders.outputs.rp_dir }}"
      zip -r "$GITHUB_WORKSPACE/${{ steps.folders.outputs.rp_zip }}" .

      cd "$GITHUB_WORKSPACE/${{ steps.folders.outputs.dp_dir }}"
      zip -r "$GITHUB_WORKSPACE/${{ steps.folders.outputs.dp_zip }}" .

      echo "✅ ZIP'ler hazır"

  - name: 📝 Release Notu Oluştur
    id: notes
    run: |
      cat <<EOF > release_notes.md
      ## 🔒 GLC Permissions System

      ### 📦 İndirme
      - Resource Pack: \`${{ steps.folders.outputs.rp_zip }}\`
      - Data Pack: \`${{ steps.folders.outputs.dp_zip }}\`

      ### ⚙️ Kurulum
      1. DP ZIP → \`world/datapacks/\`
      2. RP ZIP → \`resourcepacks/\`
      3. \`/reload\`
      4. \`/function glc_permissions:setup\`

      ### ✨ Özellikler
      - 👥 Dinamik rol sistemi
      - 🔑 Grup bazlı izinler
      - ⚡ Fonksiyon bazlı yönetim
      - 🌐 TR/EN dil desteği

      ---
      Build: ${{ github.run_number }}
      Commit: ${{ github.sha }}
      EOF

  - name: 🚀 Release Oluştur (GH CLI)
    run: |
      gh release create "${{ steps.folders.outputs.version }}" \
        "${{ steps.folders.outputs.rp_zip }}" \
        "${{ steps.folders.outputs.dp_zip }}" \
        --title "GLC Permissions ${{ steps.folders.outputs.version }}" \
        --notes-file release_notes.md

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
