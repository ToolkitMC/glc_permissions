name: Release GLC Permissions

env:
  # Sadece bunu bırakıyoruz, GitHub CLI buna ihtiyaç duymaz ama genel ortamı temiz tutar.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versiyon (örn: v2.5.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set Folder Names
        id: folders
        run: |
          VERSION="${{ github.event.inputs.version }}"
          RP_DIR=$(find packs -maxdepth 1 -type d -name "*RP*" | head -1)
          DP_DIR=$(find packs -maxdepth 1 -type d -name "*DP*" | head -1)
          
          if [ -z "$RP_DIR" ] || [ -z "$DP_DIR" ]; then
            echo "❌ Klasörler bulunamadı!"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "rp_zip=Gulce_s_Permissions_RP_${VERSION}.zip" >> $GITHUB_OUTPUT
          echo "dp_zip=Gulce_s_Permissions_DP_${VERSION}.zip" >> $GITHUB_OUTPUT
          echo "rp_dir=$RP_DIR" >> $GITHUB_OUTPUT
          echo "dp_dir=$DP_DIR" >> $GITHUB_OUTPUT

      - name: Create ZIPs
        run: |
          cd "${{ steps.folders.outputs.rp_dir }}"
          zip -r "$GITHUB_WORKSPACE/${{ steps.folders.outputs.rp_zip }}" .
          cd "$GITHUB_WORKSPACE/${{ steps.folders.outputs.dp_dir }}"
          zip -r "$GITHUB_WORKSPACE/${{ steps.folders.outputs.dp_zip }}" .

      - name: Create GitHub Release
        # BURASI KRİTİK: Dışarıdan "softprops" eklentisini çağırmıyoruz. 
        # GitHub'ın kendi 'gh' aracını kullanıyoruz. Node.js uyarısı ALMAN İMKANSIZ.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            "${{ steps.folders.outputs.rp_zip }}" \
            "${{ steps.folders.outputs.dp_zip }}" \
            --title "GLC Permissions ${{ github.event.inputs.version }}" \
            --notes "## 🔒 GLC Permissions System
            
            ### 📦 İndirme
            - Resource Pack: ${{ steps.folders.outputs.rp_zip }}
            - Data Pack: ${{ steps.folders.outputs.dp_zip }}
            
            ### ⚙️ Kurulum
            1. DP'yi world/datapacks içine at.
            2. RP'yi resourcepacks içine at.
            3. /reload yap.
            
            ---
            > Build: ${{ github.run_number }} | Commit: ${{ github.sha }}"
