name: Release GLC Permissions

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versiyon (örn: v2.5.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set Folder Names
        id: folders
        run: |
          VERSION="${{ github.event.inputs.version }}"
         
          echo "📂 Mevcut packs klasörleri:"
          ls packs/
         
          RP_DIR=$(find packs -maxdepth 1 -type d -name "*RP*" | head -1)
          DP_DIR=$(find packs -maxdepth 1 -type d -name "*DP*" | head -1)
         
          echo "🔍 Bulunan RP klasörü: $RP_DIR"
          echo "🔍 Bulunan DP klasörü: $DP_DIR"
         
          if [ -z "$RP_DIR" ]; then
            echo "❌ RP klasörü bulunamadı!"
            exit 1
          fi
          if [ -z "$DP_DIR" ]; then
            echo "❌ DP klasörü bulunamadı!"
            exit 1
          fi
         
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "rp_dir=$RP_DIR" >> $GITHUB_OUTPUT
          echo "dp_dir=$DP_DIR" >> $GITHUB_OUTPUT
          echo "rp_zip=Gulce_s_Permissions_RP_${VERSION}.zip" >> $GITHUB_OUTPUT
          echo "dp_zip=Gulce_s_Permissions_DP_${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Create RP ZIP
        run: |
          cd "${{ steps.folders.outputs.rp_dir }}"
          zip -r "$GITHUB_WORKSPACE/${{ steps.folders.outputs.rp_zip }}" .
          echo "✅ RP ZIP oluşturuldu"

      - name: Create DP ZIP
        run: |
          cd "${{ steps.folders.outputs.dp_dir }}"
          zip -r "$GITHUB_WORKSPACE/${{ steps.folders.outputs.dp_zip }}" .
          echo "✅ DP ZIP oluşturuldu"

      - name: Create GitHub Release with gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.folders.outputs.version }}"
          RP_ZIP="${{ steps.folders.outputs.rp_zip }}"
          DP_ZIP="${{ steps.folders.outputs.dp_zip }}"

          cat > release-body.md << 'EOF'
## 🔒 GLC Permissions System
### 📦 İndirme
| Dosya | Açıklama |
|-------|----------|
| `Gulce_s_Permissions_RP_${VERSION}.zip` | Resource Pack |
| `Gulce_s_Permissions_DP_${VERSION}.zip` | Data Pack |
### ⚙️ Kurulum
1. DP ZIP'i `world/datapacks/` klasörüne at
2. RP ZIP'i `resourcepacks/` klasörüne at
3. `/reload` komutu ile yükle
4. `/function glc_permissions:setup` ile başlat
### ✨ Özellikler
- 👥 Dinamik rol sistemi
- 🔑 Grup bazlı izinler
- ⚡ Fonksiyon bazlı yönetim
- 🌐 TR/EN dil desteği
---
> Build: `${{ github.run_number }}` | Commit: `${{ github.sha }}`
EOF

          gh release create "$VERSION" \
            "$RP_ZIP" "$DP_ZIP" \
            --title "GLC Permissions $VERSION" \
            --notes-file release-body.md \
            --latest
