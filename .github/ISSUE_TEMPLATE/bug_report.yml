name: "🐛 Bug Report"
description: Bir hatayı bildir
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Lütfen bilgileri eksiksiz doldurun. Eksik raporlar kapatılabilir.

  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft Versiyonu
      placeholder: "1.21.6"
    validations:
      required: true

  - type: input
    id: datapack_version
    attributes:
      label: Datapack Versiyonu
      placeholder: "v2.5.8"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Ortam
      options:
        - Singleplayer
        - Dedicated Server
        - Realms
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Hatanın Açıklaması
      description: Hata nedir?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Yeniden Üretme Adımları
      description: Adım adım nasıl tetikleniyor?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Beklenen Davranış
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log / Ekran Görüntüsü
      description: Varsa buraya ekleyin
    validations:
      required: false
